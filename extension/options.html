<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Configurações — Modular DOM Counter</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Configurações</h1>

      <form id="form">
        <label for="apiUrl">URL da API</label>
        <input
          type="url"
          id="apiUrl"
          name="apiUrl"
          placeholder="http://dalnxt01:8000"
          required
          autocomplete="off"
        />
        <p class="hint">Sem barra no final. O endpoint <code>/api/v1/ingest</code> será derivado automaticamente.</p>

        <div class="row">
          <button type="submit" id="save" class="primary">Salvar</button>
          <button type="button" id="test">Testar</button>
        </div>
      </form>

      <pre id="status" class="status"></pre>
    </main>
    <script src="options.js"></script>
  </body>
</html>
