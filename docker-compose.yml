services:
  db:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-scraper_dev}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-scraper_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    profiles: ["postgres"]
    image: liquibase/liquibase:4.27
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/changelog:/liquibase/changelog
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-scraper_dev}
      LIQUIBASE_COMMAND_USERNAME: ${POSTGRES_USER:-app}
      LIQUIBASE_COMMAND_PASSWORD: ${POSTGRES_PASSWORD:-app}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog/master.xml
    command: ["update"]

  liquibase-sqlite:
    profiles: ["sqlite"]
    build:
      context: ./db
      dockerfile: Dockerfile.liquibase-sqlite
    volumes:
      - ./db/changelog-sqlite:/liquibase/changelog
      - ./data:/data
    environment:
      LIQUIBASE_COMMAND_URL: "jdbc:sqlite:/data/scraper.db"
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog/master.xml
    command: ["update"]

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@db:5432/scraper_dev}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app
      - ./data:/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
